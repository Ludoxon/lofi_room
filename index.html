<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>Lo-Fi Room</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="canvas" width="600" height="600"></canvas>

  <audio id="audio-pageflip" src="audio/pageflip.ogg" preload="auto"></audio>
  <audio id="audio-rain" src="audio/rain.ogg" loop preload="auto"></audio>
  <audio id="audio-lofi" src="audio/lofi.ogg" loop preload="auto"></audio>
  <audio id="audio-water" src="audio/water.ogg" loop preload="auto"></audio>
  <audio id="audio-tick" src="audio/tick.ogg" loop preload="auto"></audio>
  <audio id="audio-purr" src="audio/purr.ogg" loop preload="auto"></audio>
  <audio id="audio-candle" src="audio/candle.ogg" loop preload="auto"></audio>
  <audio id="audio-fan" src="audio/fan.ogg" loop preload="auto"></audio>
  <audio id="audio-crickets" src="audio/crickets.ogg" loop preload="auto"></audio>

  <script src="app.js"></script>
</body>
</html>
